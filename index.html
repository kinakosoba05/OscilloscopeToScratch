<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Scratch スマート・オシロスコープ データ生成 (真・完全同期版)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; background: #1e1e1e; color: #fff; border-radius: 8px; }
        h1 { color: #4c97ff; font-size: 20px; text-align: center; }
        .box { background: #2d2d2d; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; }
        input[type="file"], input[type="number"] { width: 100%; padding: 10px; background: #3c3c3c; color: white; border: none; border-radius: 4px; box-sizing: border-box; }
        .range-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; }
        .val-disp { font-family: monospace; font-size: 14px; color: #4c97ff; min-width: 60px; text-align: right; }
        button { width: 100%; padding: 15px; background: #4c97ff; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #3380ea; }
        #status { margin-top: 15px; text-align: center; color: #4eff8a; white-space: pre-line; line-height: 1.5; }
        .note { font-size: 12px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>スマート・オシロスコープ (真・完全同期版)</h1>
    
    <div class="box">
        <label>1. 音声ファイルを選択:</label>
        <input type="file" id="audioFile" accept="audio/*">
    </div>

    <div class="box">
        <label>2. 画面に表示する波の幅 (タイムディビジョン):</label>
        <div class="range-container">
            <input type="range" id="timeStep" min="0.002" max="0.050" step="0.001" value="0.016">
            <span id="timeStepVal" class="val-disp">0.016秒</span>
        </div>
    </div>

    <div class="box">
        <label>3. 描画の解像度 (データ削減):</label>
        <div class="range-container">
            <input type="range" id="resStep" min="60" max="480" step="30" value="120">
            <span id="resStepVal" class="val-disp">120</span>
        </div>
    </div>

    <div class="box">
        <label>4. 出力フレームレート (FPS):</label>
        <input type="number" id="fpsSetting" min="1" max="250" value="60">
        <div class="note">※TurboWarpで設定するFPSと同じ数字を入れてね！(1〜250)</div>
    </div>

    <button id="processBtn">データを抽出してダウンロード</button>
    <div id="status">ファイルを選択してボタンを押してください。</div>

    <script>
        const timeStepEl = document.getElementById('timeStep');
        const timeStepValEl = document.getElementById('timeStepVal');
        timeStepEl.addEventListener('input', () => { timeStepValEl.innerText = timeStepEl.value + '秒'; });

        const resStepEl = document.getElementById('resStep');
        const resStepValEl = document.getElementById('resStepVal');
        resStepEl.addEventListener('input', () => { resStepValEl.innerText = resStepEl.value; });

        document.getElementById('processBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('audioFile');
            const status = document.getElementById('status');
            if (!fileInput.files.length) return status.innerText = 'エラー: ファイルを選択してね！';

            const file = fileInput.files[0];
            const targetDuration = parseFloat(timeStepEl.value);
            const resolution = parseInt(resStepEl.value);
            const targetFPS = parseInt(document.getElementById('fpsSetting').value);

            if (targetFPS < 1 || targetFPS > 250) {
                return status.innerText = 'エラー: FPSは1から250の間で入力してね！';
            }

            status.innerText = `音声を解析中... (${targetFPS}FPS用に処理中)`;

            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const rawData = audioBuffer.getChannelData(0);
                const sampleRate = audioBuffer.sampleRate;
                
                let maxPeak = 0;
                for (let i = 0; i < rawData.length; i++) {
                    const absVal = Math.abs(rawData[i]);
                    if (maxPeak < absVal) maxPeak = absVal;
                }
                
                const amp = maxPeak > 0 ? 150 / maxPeak : 1;
                const threshold = maxPeak * 0.03; // トリガー感度を少しシャープに

                const totalSamplesInFrame = targetDuration * sampleRate;
                const step = totalSamplesInFrame / resolution;
                const fpsSamples = sampleRate / targetFPS; 

                let resultLines = [];
                let currentIndex = 0;
                
                // トリガーを探す範囲（1フレーム進む距離の半分、または最低でも0.02秒分）
                const searchRange = Math.max(Math.floor(fpsSamples * 0.5), Math.floor(sampleRate * 0.02));

                while (currentIndex < rawData.length - totalSamplesInFrame) {
                    let startPos = Math.floor(currentIndex);
                    let foundTrigger = false;

                    // 1. トリガーを探す
                    for (let i = startPos; i < startPos + searchRange && i < rawData.length - totalSamplesInFrame; i++) {
                        // 負から正へ閾値をまたいだ瞬間を検知
                        if (rawData[i] < threshold && rawData[i + 1] >= threshold) {
                            startPos = i + 1;
                            foundTrigger = true;
                            break;
                        }
                    }

                    // 2. 波形データを抽出
                    let frameArray = [];
                    for (let j = 0; j < resolution; j++) {
                        const samplePos = Math.floor(startPos + (j * step));
                        if (samplePos < rawData.length) {
                            frameArray.push(Math.round(rawData[samplePos] * amp));
                        } else {
                            frameArray.push("0");
                        }
                    }
                    resultLines.push(frameArray.join('/'));

                    // 3. 次のフレームの開始位置を決定（【超重要】ここを修正！）
                    // トリガーが見つかった場合は「見つかった位置」から、
                    // 見つからなかった場合は「現在の位置」から、正確に1フレーム分（fpsSamples）進める
                    if (foundTrigger) {
                        currentIndex = startPos + fpsSamples;
                    } else {
                        currentIndex = currentIndex + fpsSamples;
                    }
                }

                const blob = new Blob([resultLines.join('\n')], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${file.name.split('.')[0]}_${targetFPS}fps_data.txt`;
                document.body.appendChild(a);
                a.click();
                
                status.innerText = `完了！\n${resultLines.length} フレーム（${targetFPS}FPS）を出力したよ。`;
            } catch (error) {
                status.innerText = 'エラーが発生したよ。別の音声ファイルで試してみて。';
                console.error(error);
            }
        });
    </script>
</body>
</html>
